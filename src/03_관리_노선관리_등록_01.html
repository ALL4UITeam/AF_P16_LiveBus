<!DOCTYPE html>
<html lang="ko">

<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1" />
	<title>LIVE BUS - 노선 등록 (1/4)</title>
	{{> meta}}
</head>

<body>

<div class="app">
	{{> header}}

	<main class="content Mac-container" role="main">
		<div class="Map">


			<!-- ============================================
			     노선 등록 패널 — 1단계: 기본 정보 입력
			     ============================================ -->
			<div class="panel--expand regi-panel">

				<!-- 패널 헤더 -->
				<div class="panel--expand__head">
					<a href="./03_관리_노선관리.html" class="back" title="목록으로" aria-label="목록으로"></a>
					<span>노선등록</span>
					<a href="./03_관리_노선관리.html" class="close" title="닫기" aria-label="닫기"></a>
				</div>

				<div class="panel--expand__content">

					<!-- 스텝 인디케이터: 1단계 active -->
					<div class="regi-step-bar">
						<div class="regi-step">
							<div class="regi-step__item" data-status="active">
								<div class="regi-step__icon"></div>
								<div class="regi-step__label-wrap">
									<span class="regi-step__num">01</span>
									<span class="regi-step__label">기본 정보 입력</span>
								</div>
							</div>
							<div class="regi-step__item">
								<div class="regi-step__icon"></div>
								<div class="regi-step__label-wrap">
									<span class="regi-step__num">02</span>
									<span class="regi-step__label">정류장 선택</span>
								</div>
							</div>
							<div class="regi-step__item">
								<div class="regi-step__icon"></div>
								<div class="regi-step__label-wrap">
									<span class="regi-step__num">03</span>
									<span class="regi-step__label">경로 설정</span>
								</div>
							</div>
							<div class="regi-step__item">
								<div class="regi-step__icon"></div>
								<div class="regi-step__label-wrap">
									<span class="regi-step__num">04</span>
									<span class="regi-step__label">운행 시간 설정</span>
								</div>
							</div>
						</div>
					</div>

					<!-- 가이드 -->
					<div class="regi-guide">
						<span>노선의 기본 정보를 입력해주세요.</span>
					</div>

					<!-- 폼 콘텐츠 -->
					<div class="regi-body" data-simplebar>
						<div class="regi-route-section regi-route-section--basic">
							<div class="regi-form-head">
								<p class="regi-form-title">기본정보 입력</p>
								<p class="regi-form-required">* 표시는 필수 입력사항입니다.</p>
							</div>

							<div class="regi-form-row">
								<label>노선명</label>
								<input type="text" class="form-control" id="inputRouteName" placeholder="노선명을 입력하세요." value="30" />
							</div>
							<div class="regi-form-row">
								<label class="required">노선ID</label>
								<input type="text" class="form-control" id="inputRouteId" placeholder="노선 ID를 입력하세요." value="033-1234-5678" />
							</div>
							<div class="regi-form-row">
								<label class="required">상하행 구분</label>
								<select class="form-control" id="inputDirection">
									<option value="">선택하세요</option>
									<option value="up" selected>상행</option>
									<option value="down">하행</option>
									<option value="both">상하행</option>
									<option value="loop">순환</option>
								</select>
							</div>
							<div class="regi-form-row">
								<label class="required">관리지역</label>
								<select class="form-control" id="inputRegion">
									<option value="">선택하세요</option>
									<option value="guje" selected>구암동</option>
									<option value="gosan">고산면</option>
									<option value="wanju">완주군</option>
								</select>
							</div>
							<div class="regi-form-row">
								<label class="required">버스유형</label>
								<select class="form-control" id="inputBusType">
									<option value="">선택하세요</option>
									<option value="seated" selected>좌석형농어촌버스</option>
									<option value="express">급행버스</option>
									<option value="local">마을버스</option>
								</select>
							</div>
						</div>

					</div><!-- /regi-body -->

					<!-- 하단 버튼 -->
					<div class="regi-foot">
						<div class="btn-group mt0">
							<a href="./03_관리_노선관리.html" class="btn danger">취소</a>
						</div>
						<div class="btn-group mt0">
							<button type="button" class="btn primary" id="btnNext">다음</button>
						</div>
					</div>

				</div><!-- /panel--expand__content -->
			</div><!-- /panel--expand -->


			<!-- 모달 1: 필수값 미입력 -->
			<div class="modal modal--route-info" id="modalRouteAlert">
				<div class="modal-dialog">
					<div class="modal-header">
						<span>노선 등록</span>
						<button type="button" onclick="closeModal('modalRouteAlert')" aria-label="닫기"></button>
					</div>
					<div class="modal-content">
						<div class="modal-route-body">
							<div class="modal-icon"></div>
							<p class="modal-message">
								노선명을 입력하세요.<br>
								기본정보 입력 후 정류장&경로 설정이 가능합니다.
							</p>
						</div>
						<div class="btn-group">
							<button type="button" class="btn primary" onclick="closeModal('modalRouteAlert')">확인</button>
						</div>
					</div>
				</div>
			</div>

			<!-- 모달 2: 중복 노선 -->
			<div class="modal modal--route-info modal--route-info--duplicate" id="modalRouteDuplicate">
				<div class="modal-dialog">
					<div class="modal-header">
						<span>노선 등록</span>
						<button type="button" onclick="closeModal('modalRouteDuplicate')" aria-label="닫기"></button>
					</div>
					<div class="modal-content">
						<div class="modal-route-body">
							<div class="modal-icon"></div>
							<p class="modal-message">
								해당 노선은 이미 존재하는 노선입니다.<br>
								기존 노선을 삭제하고<br>
								신규 노선으로 업데이트하시겠습니까?
							</p>
							<p class="modal-sub">* 기존 노선을 수정하려면 '수정하러 가기' 버튼을 클릭하세요.</p>
						</div>
						<div class="btn-group">
							<a href="./03_관리_노선관리_등록_01.html" class="btn cancle">수정하러 가기</a>
							<a href="./03_관리_노선관리_등록_02.html" class="btn primary">다음</a>
						</div>
					</div>
				</div>
			</div>

		</div><!-- /Map -->
	</main>
</div>

{{> footer}}

<script>
(function () {
	document.getElementById('btnNext').addEventListener('click', function () {
		var routeName = document.getElementById('inputRouteName').value.trim();
		var routeId   = document.getElementById('inputRouteId').value.trim();

		if (!routeName || !routeId) {
			openModal('modalRouteAlert');
			return;
		}
		// mock: 노선명 "30" → 중복 처리
		if (routeName === '30') {
			openModal('modalRouteDuplicate');
			return;
		}
		location.href = './03_관리_노선관리_등록_02.html';
	});
})();
</script>

</body>
</html>
