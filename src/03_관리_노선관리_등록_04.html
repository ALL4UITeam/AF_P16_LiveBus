<!DOCTYPE html>
<html lang="ko">

<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1" />
	<title>LIVE BUS - 노선 등록 (4/4)</title>
	{{> meta}}
</head>

<body>

<div class="app">
	{{> header}}

	<main class="content Mac-container" role="main">
		<div class="Map">


			<!-- ============================================================
			     노선 등록 패널 — 4단계: 운행 시간 설정
			     ============================================================ -->
			<div class="panel--expand regi-panel">

				<!-- 패널 헤더 -->
				<div class="panel--expand__head">
					<a href="./03_관리_노선관리_등록_03.html" class="back" title="이전 단계" aria-label="이전 단계"></a>
					<span>노선등록</span>
					<a href="./03_관리_노선관리.html" class="close" title="닫기" aria-label="닫기"></a>
				</div>

				<div class="panel--expand__content">

					<!-- 스텝 인디케이터 -->
					<div class="regi-step-bar">
						<div class="regi-step">
							<div class="regi-step__item" data-status="done">
								<div class="regi-step__icon"></div>
								<div class="regi-step__label-wrap">
									<span class="regi-step__num">01</span>
									<span class="regi-step__label">기본 정보 입력</span>
								</div>
							</div>
							<div class="regi-step__item" data-status="done">
								<div class="regi-step__icon"></div>
								<div class="regi-step__label-wrap">
									<span class="regi-step__num">02</span>
									<span class="regi-step__label">정류장 선택</span>
								</div>
							</div>
							<div class="regi-step__item" data-status="done">
								<div class="regi-step__icon"></div>
								<div class="regi-step__label-wrap">
									<span class="regi-step__num">03</span>
									<span class="regi-step__label">경로 설정</span>
								</div>
							</div>
							<div class="regi-step__item" data-status="active">
								<div class="regi-step__icon"></div>
								<div class="regi-step__label-wrap">
									<span class="regi-step__num">04</span>
									<span class="regi-step__label">운행 시간 설정</span>
								</div>
							</div>
						</div>
					</div>

					<!-- 가이드 -->
					<div class="regi-guide">
						<span class="regi-guide__icon"></span>
						<span>운행 일정 설정 후 시간표 자동 생성 버튼을 클릭하세요.</span>
					</div>

					<!-- 폼 콘텐츠 -->
					<div class="regi-body" data-simplebar>
						<div class="route-time">
							<div class="route-time__mode" id="dispatchMode">
								<button type="button" class="route-time__mode-card is-selected" data-mode="individual" aria-pressed="true">
									<span class="route-time__mode-icon route-time__mode-icon--individual" aria-hidden="true"></span>
									<span class="route-time__mode-copy">
										<span class="route-time__mode-title">개별 배차</span>
										<span class="route-time__mode-desc">요일별 배차 설정</span>
									</span>
									<span class="route-time__mode-radio" aria-hidden="true"></span>
								</button>
								<button type="button" class="route-time__mode-card" data-mode="period" aria-pressed="false">
									<span class="route-time__mode-icon route-time__mode-icon--period" aria-hidden="true"></span>
									<span class="route-time__mode-copy">
										<span class="route-time__mode-title">기간 배차</span>
										<span class="route-time__mode-desc">주기별 배차 설정</span>
									</span>
									<span class="route-time__mode-radio" aria-hidden="true"></span>
								</button>
							</div>

							<div class="route-time__box">
								<div class="route-time__tabs" id="dayTabs">
									<button type="button" class="route-time__tab" data-day="weekday">평일</button>
									<button type="button" class="route-time__tab" data-day="sat">토요일</button>
									<button type="button" class="route-time__tab" data-day="sun">일요일</button>
									<button type="button" class="route-time__tab is-active" data-day="hol">공휴일</button>
								</div>

								<div class="route-time__form">
									<div class="route-time__form-row">
										<label class="route-time__label">첫차 시간</label>
										<div class="route-time__control route-time__control--with-icon">
											<input id="inputFirstBus" type="text" value="09:28" placeholder="--:--" autocomplete="off" />
											<span class="route-time__clock route-time__clock--trigger" data-time-picker-trigger="first" role="button" tabindex="0" aria-label="첫차 시간 선택"></span>
										</div>
									</div>
									<div class="route-time__form-row">
										<label class="route-time__label">최소 배차 간격</label>
										<div class="route-time__control">
											<select id="minInterval">
												<option>10분</option>
												<option>15분</option>
												<option>20분</option>
												<option selected>28분</option>
												<option>30분</option>
											</select>
										</div>
									</div>
									<div class="route-time__form-row">
										<label class="route-time__label">최대 배차 간격</label>
										<div class="route-time__control">
											<select id="maxInterval">
												<option>10분</option>
												<option>15분</option>
												<option>20분</option>
												<option selected>28분</option>
												<option>30분</option>
											</select>
										</div>
									</div>
									<div class="route-time__form-row">
										<label class="route-time__label">운행 횟수</label>
										<div class="route-time__control">
											<input id="runCountInput" type="text" value="70" />
										</div>
									</div>
								</div>

								<div class="route-time__actions">
									<label class="route-time__check">
										<span>모든 요일에 동일한 일정 적용</span>
										<input type="checkbox" id="chkApplyAll" />
									</label>
									<button type="button" class="btn route-time__generate" id="btnGenSchedule">시간표 자동 생성</button>
								</div>
							</div>

							<div class="regi-route-section">
								<div class="route-time__timetable">
									<div class="route-time__timetable-head">
										<h3 class="route-time__timetable-title">시간표</h3>
										<p class="route-time__count">운행횟수 <strong id="timetableCount">0</strong>회</p>
									</div>
									<div class="route-time__add-row">
										<div class="route-time__add-input">
											<input id="inputDirectTime" type="text" placeholder="-- : --" autocomplete="off" />
											<span class="route-time__clock route-time__clock--trigger" data-time-picker-trigger="direct" role="button" tabindex="0" aria-label="시간 선택"></span>
										</div>
										<button type="button" id="btnAddTime" class="route-time__add-btn" disabled>추가</button>
									</div>
									<div class="route-time__grid" id="timetableGrid"></div>
									<div class="route-time__empty" id="timetableEmpty">
										<span class="route-time__empty-dot" aria-hidden="true"></span>
										시간표 자동 생성 버튼을 클릭시 시간표가 생성됩니다.
									</div>
								</div>
							</div>
						</div>
					</div><!-- /regi-body -->

					<!-- 하단 버튼 -->
					<div class="regi-foot">
						<div class="btn-group mt0">
							<a href="./03_관리_노선관리.html" class="btn danger">취소</a>
						</div>
						<div class="btn-group mt0">
							<button type="button" class="btn primary" id="btnSaveRoute">노선 저장</button>
						</div>
					</div>

				</div><!-- /panel--expand__content -->
			</div><!-- /panel--expand -->

		</div><!-- /Map -->
	</main>
</div>

{{> footer}}

<script>
(function () {
	var mockTimes = [
		'05:00', '05:16', '05:32', '05:48', '06:04',
		'06:20', '06:36', '06:52', '07:08', '07:24',
		'07:40', '07:56', '08:12', '08:28', '08:44',
		'09:00', '09:16', '09:32', '09:48', '10:04'
	];
	var state = {
		mode: 'individual',
		times: mockTimes.slice(),
		activeIndex: null,
		pickerType: '',
		hour: 5,
		minute: 16
	};

	var dayTabs = document.getElementById('dayTabs');
	var dispatchMode = document.getElementById('dispatchMode');
	var timetableGrid = document.getElementById('timetableGrid');
	var inputFirstBus = document.getElementById('inputFirstBus');
	var inputDirectTime = document.getElementById('inputDirectTime');
	var btnAddTime = document.getElementById('btnAddTime');
	var timetableCount = document.getElementById('timetableCount');
	var timetableEmpty = document.getElementById('timetableEmpty');
	var clockTriggerFirst = document.querySelector('[data-time-picker-trigger="first"]');
	var clockTriggerDirect = document.querySelector('[data-time-picker-trigger="direct"]');

	dayTabs.addEventListener('click', function (e) {
		var tab = e.target.closest('.route-time__tab');
		if (!tab) return;
		dayTabs.querySelectorAll('.route-time__tab').forEach(function (item) {
			item.classList.remove('is-active');
		});
		tab.classList.add('is-active');
	});

	dispatchMode.addEventListener('click', function (e) {
		var card = e.target.closest('.route-time__mode-card');
		if (!card) return;
		state.mode = card.getAttribute('data-mode');
		dispatchMode.querySelectorAll('.route-time__mode-card').forEach(function (item) {
			var selected = item === card;
			item.classList.toggle('is-selected', selected);
			item.setAttribute('aria-pressed', selected ? 'true' : 'false');
		});
	});

	document.getElementById('btnGenSchedule').addEventListener('click', function () {
		state.times = mockTimes.slice();
		renderGrid();
	});

	btnAddTime.addEventListener('click', function () {
		addTimeByInput();
	});

	inputDirectTime.addEventListener('keydown', function (e) {
		if (e.key === 'Enter') {
			e.preventDefault();
			addTimeByInput();
		}
	});
	inputDirectTime.addEventListener('input', function () {
		updateAddButtonState();
	});

	clockTriggerFirst.addEventListener('click', function (e) {
		e.stopPropagation();
		openInputPopover(inputFirstBus, inputFirstBus.parentElement, 'first');
	});
	clockTriggerDirect.addEventListener('click', function (e) {
		e.stopPropagation();
		openInputPopover(inputDirectTime, inputDirectTime.parentElement, 'direct');
	});
	clockTriggerFirst.addEventListener('mousedown', function (e) {
		e.preventDefault();
	});
	clockTriggerDirect.addEventListener('mousedown', function (e) {
		e.preventDefault();
	});
	clockTriggerFirst.addEventListener('keydown', function (e) {
		if (e.key === 'Enter' || e.key === ' ') {
			e.preventDefault();
			openInputPopover(inputFirstBus, inputFirstBus.parentElement, 'first');
		}
	});
	clockTriggerDirect.addEventListener('keydown', function (e) {
		if (e.key === 'Enter' || e.key === ' ') {
			e.preventDefault();
			openInputPopover(inputDirectTime, inputDirectTime.parentElement, 'direct');
		}
	});

	function addTimeByInput() {
		var normalized = normalizeTime(inputDirectTime.value);
		if (!normalized) return;
		if (state.times.indexOf(normalized) !== -1) {
			inputDirectTime.value = '';
			return;
		}
		state.times.push(normalized);
		state.times.sort();
		inputDirectTime.value = '';
		updateAddButtonState();
		renderGrid();
	}

	function normalizeTime(value) {
		var clean = String(value || '').replace(/\s/g, '');
		var match = clean.match(/^(\d{1,2}):(\d{1,2})$/);
		if (!match) return '';
		var h = Number(match[1]);
		var m = Number(match[2]);
		if (Number.isNaN(h) || Number.isNaN(m) || h < 0 || h > 23 || m < 0 || m > 59) return '';
		return pad(h) + ':' + pad(m);
	}

	function pad(num) {
		return String(num).padStart(2, '0');
	}

	function buildPopover() {
		var pop = document.createElement('div');
		pop.className = 'route-time-pop';
		pop.id = 'timePopover';
		pop.innerHTML = [
			'<div class="route-time-pop__spinner">',
			'  <div class="route-time-pop__unit">',
			'    <button type="button" data-spin="hour-up" class="route-time-pop__arrow route-time-pop__arrow--up" aria-label="시간 증가"></button>',
			'    <span id="popHour">05</span>',
			'    <button type="button" data-spin="hour-down" class="route-time-pop__arrow route-time-pop__arrow--down" aria-label="시간 감소"></button>',
			'  </div>',
			'  <span class="route-time-pop__colon">:</span>',
			'  <div class="route-time-pop__unit">',
			'    <button type="button" data-spin="min-up" class="route-time-pop__arrow route-time-pop__arrow--up" aria-label="분 증가"></button>',
			'    <span id="popMinute">16</span>',
			'    <button type="button" data-spin="min-down" class="route-time-pop__arrow route-time-pop__arrow--down" aria-label="분 감소"></button>',
			'  </div>',
			'</div>',
			'<div class="route-time-pop__actions">',
			'  <button type="button" data-action="delete" class="route-time-pop__btn">삭제</button>',
			'  <button type="button" data-action="confirm" class="route-time-pop__btn route-time-pop__btn--confirm">확인</button>',
			'</div>'
		].join('');
		return pop;
	}

	function bindPopoverAction(pop) {
		pop.addEventListener('click', function (e) {
			e.stopPropagation();
			var spin = e.target.getAttribute('data-spin');
			var action = e.target.getAttribute('data-action');
			if (spin) {
				spinTime(spin);
				updatePopoverValue(pop);
				return;
			}
			if (action === 'confirm') {
				confirmPopover();
				return;
			}
			if (action === 'delete') {
				deleteTime();
			}
		});
	}

	function setSpinValueFromText(timeText) {
		var normalized = normalizeTime(timeText);
		if (!normalized) return;
		var parts = normalized.split(':');
		state.hour = Number(parts[0]);
		state.minute = Number(parts[1]);
	}

	timetableGrid.addEventListener('click', function (e) {
		if (e.target.closest('#timePopover')) return;
		var btn = e.target.closest('.route-time__time-btn');
		if (!btn) return;
		var idx = Number(btn.getAttribute('data-index'));
		openPopover(idx, btn);
	});
	timetableGrid.addEventListener('keydown', function (e) {
		if (e.key !== 'Enter' && e.key !== ' ') return;
		var btn = e.target.closest('.route-time__time-btn');
		if (!btn) return;
		e.preventDefault();
		var idx = Number(btn.getAttribute('data-index'));
		openPopover(idx, btn);
	});

	document.addEventListener('click', function (e) {
		var pop = document.getElementById('timePopover');
		if (!pop) return;
		if (pop.contains(e.target)) return;
		if (e.target.closest('.route-time__time-btn')) return;
		closePopover();
	});

	function openPopover(index, targetButton) {
		closePopover();
		state.activeIndex = index;
		state.pickerType = 'grid';
		var parts = state.times[index].split(':');
		state.hour = Number(parts[0]);
		state.minute = Number(parts[1]);
		targetButton.classList.add('is-selected');

		var pop = buildPopover();
		targetButton.appendChild(pop);
		updatePopoverValue(pop);
		bindPopoverAction(pop);
	}

	function openInputPopover(inputEl, anchorEl, pickerType) {
		closePopover();
		state.activeIndex = null;
		state.pickerType = pickerType;
		setSpinValueFromText(inputEl.value);

		var pop = buildPopover();
		anchorEl.appendChild(pop);
		updatePopoverValue(pop);
		bindPopoverAction(pop);
	}

	function spinTime(type) {
		if (type === 'hour-up') state.hour = (state.hour + 1) % 24;
		if (type === 'hour-down') state.hour = (state.hour + 23) % 24;
		if (type === 'min-up') state.minute = (state.minute + 1) % 60;
		if (type === 'min-down') state.minute = (state.minute + 59) % 60;
	}

	function updatePopoverValue(pop) {
		pop.querySelector('#popHour').textContent = pad(state.hour);
		pop.querySelector('#popMinute').textContent = pad(state.minute);
	}

	function confirmPopover() {
		var picked = pad(state.hour) + ':' + pad(state.minute);
		if (state.pickerType === 'grid') {
			if (state.activeIndex === null) return;
			state.times[state.activeIndex] = picked;
			state.times = Array.from(new Set(state.times)).sort();
			closePopover();
			renderGrid();
			return;
		}

		if (state.pickerType === 'first') {
			inputFirstBus.value = picked;
		}
		if (state.pickerType === 'direct') {
			inputDirectTime.value = picked;
			updateAddButtonState();
		}
		closePopover();
	}

	function deleteTime() {
		if (state.pickerType === 'grid') {
			if (state.activeIndex === null) return;
			state.times.splice(state.activeIndex, 1);
			closePopover();
			renderGrid();
			return;
		}
		if (state.pickerType === 'first') {
			inputFirstBus.value = '';
		}
		if (state.pickerType === 'direct') {
			inputDirectTime.value = '';
			updateAddButtonState();
		}
		closePopover();
	}

	function closePopover() {
		var old = document.getElementById('timePopover');
		if (old) old.remove();
		timetableGrid.querySelectorAll('.route-time__time-btn').forEach(function (item) {
			item.classList.remove('is-selected');
		});
		state.activeIndex = null;
		state.pickerType = '';
	}

	function updateAddButtonState() {
		var normalized = normalizeTime(inputDirectTime.value);
		btnAddTime.disabled = !normalized;
	}

	function renderGrid() {
		timetableGrid.innerHTML = '';
		var hasTimes = state.times.length > 0;
		timetableGrid.classList.toggle('is-empty', !hasTimes);
		timetableEmpty.classList.toggle('is-show', !hasTimes);

		state.times.forEach(function (time, index) {
			var btn = document.createElement('div');
			btn.className = 'route-time__time-btn';
			btn.setAttribute('data-index', String(index));
			btn.setAttribute('role', 'button');
			btn.setAttribute('tabindex', '0');
			btn.setAttribute('aria-label', '시간 ' + time + ' 편집');
			btn.textContent = time.replace(':', ' : ');
			timetableGrid.appendChild(btn);
		});
		timetableCount.textContent = String(state.times.length);
	}

	document.getElementById('btnSaveRoute').addEventListener('click', function () {
		alert('노선이 저장되었습니다. (mock)');
		location.href = './03_관리_노선관리.html';
	});

	updateAddButtonState();
	renderGrid();
})();
</script>

</body>
</html>
